openapi: 3.0.0
info:
  title: AM Arena Backend API
  version: 1.0.0
  description: API documentation for AM Arena Backend. All endpoints follow controller → service → repo pattern. Use Bearer JWT for protected routes.

servers:
  - url: http://localhost:5000
    description: Local development (prefix routes with BASE_URL if set, e.g. /)

tags:
  - name: Auth
    description: Registration, login, session, current user
  - name: Friends
    description: Friend requests and friendships
  - name: Achievements
    description: Achievement definitions and admin assignment
  - name: Reels
    description: Reels, comments, likes
  - name: PUBG Tournament
    description: PUBG tournaments, registration fields, signup
  - name: User
    description: Leaderboard and public profiles
  - name: Hero content
    description: CMS-style hero slides (admin mutations, public reads)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from login/register (Authorization header)

  schemas:
    ApiResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          description: Response payload (varies by endpoint)
        meta:
          type: object
          description: Present for paginated responses
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    # Auth schemas
    AuthRegisterBody:
      type: object
      required:
        - full_name
        - gamer_name
        - email
        - password
      properties:
        full_name:
          type: string
        gamer_name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        phone:
          type: string
          description: Optional; validated when provided
        profile_picture_url:
          type: string
          format: uri
          description: Optional URL (yup url validation)

    AuthLoginBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthTokensResponse:
      type: object
      properties:
        user:
          type: object
        accessToken:
          type: string

    # Friend schemas
    SendFriendRequestBody:
      type: object
      required:
        - friend_user_id
      properties:
        friend_user_id:
          type: integer
          minimum: 1

    AcceptFriendRequestBody:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: integer
          minimum: 1

    GetFriendsQuery:
      type: object
      properties:
        status:
          type: string
          enum: [pending, accepted, blocked]
        gamer_name:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    RemoveFriendshipBody:
      type: object
      required:
        - friend_user_id
      properties:
        friend_user_id:
          type: integer
          minimum: 1

    # Achievement schemas
    CreateAchievementBody:
      type: object
      required:
        - name
        - description
        - xp_reward
      properties:
        name:
          type: string
        description:
          type: string
        color_theme:
          type: string
          nullable: true
        icon_url:
          type: string
          nullable: true
          description: Optional if icon file is uploaded via multipart
        xp_reward:
          type: number
          minimum: 0

    UpdateAchievementBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        color_theme:
          type: string
          nullable: true
        icon_url:
          type: string
          nullable: true
        xp_reward:
          type: number
          minimum: 0

    GetAchievementsQuery:
      type: object
      properties:
        name:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    AssignAchievementBody:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: integer
          minimum: 1

    # Reel schemas
    CreateReelBody:
      type: object
      required:
        - title
        - video_url
        - description
      properties:
        title:
          type: string
        video_url:
          type: string
        description:
          type: string

    GetReelsQuery:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    AddCommentBody:
      type: object
      required:
        - comment
      properties:
        comment:
          type: string

    GetCommentsQuery:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    # PUBG Tournament schemas (matches create-pubg-tournament.dto / update-pubg-tournament.dto)
    PubgGameCreate:
      type: object
      required:
        - type
        - map
      properties:
        type:
          type: string
          enum: [solo, duo, squad]
        map:
          type: string

    PubgGameUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [solo, duo, squad]
        map:
          type: string

    RegistrationFieldSchema:
      type: object
      required:
        - label
        - type
      properties:
        label:
          type: string
        type:
          type: string
          enum: [string, number, boolean, select]
        options:
          type: string
          nullable: true
        required:
          type: boolean
          default: true

    RegistrationFieldUpdateSchema:
      type: object
      properties:
        label:
          type: string
        type:
          type: string
          enum: [string, number, boolean, select]
        options:
          type: string
          nullable: true
        required:
          type: boolean

    CreatePubgTournamentMultipart:
      type: object
      description: >
        Matches POST /pubg-tournament with multipart (upload.single("image")).
        Field `game` is the nested object from createPubgTournamentSchema.game.
        Numeric fields may arrive as strings from multipart and are coerced by validation.
      required:
        - image
        - title
        - description
        - entry_fee
        - prize_pool
        - max_players
        - game
      properties:
        image:
          type: string
          format: binary
          description: Game image file (stored for PubgGame.image)
        title:
          type: string
        description:
          type: string
        entry_fee:
          type: number
          minimum: 0
        prize_pool:
          type: number
          minimum: 0
        max_players:
          type: integer
          minimum: 1
        start_date:
          type: string
          nullable: true
          description: Optional ISO date string; stored as tournament start_date
        end_date:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
        game:
          $ref: "#/components/schemas/PubgGameCreate"
        registration_fields:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationFieldSchema"
          default: []

    CreatePubgTournamentBody:
      description: >
        Same logical shape as JSON body validated by createPubgTournamentSchema (used when documenting request shape).
        Live create endpoint uses multipart/form-data with binary `image` — see CreatePubgTournamentMultipart.
      type: object
      required:
        - game
        - title
        - description
        - entry_fee
        - prize_pool
        - max_players
      properties:
        game:
          $ref: "#/components/schemas/PubgGameCreate"
        title:
          type: string
        description:
          type: string
        entry_fee:
          type: number
          minimum: 0
        prize_pool:
          type: number
          minimum: 0
        max_players:
          type: integer
          minimum: 1
        start_date:
          type: string
          nullable: true
        end_date:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
        registration_fields:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationFieldSchema"
          default: []

    UpdatePubgTournamentBody:
      type: object
      properties:
        game:
          $ref: "#/components/schemas/PubgGameUpdate"
        title:
          type: string
        description:
          type: string
        entry_fee:
          type: number
          minimum: 0
        prize_pool:
          type: number
          minimum: 0
        max_players:
          type: integer
          minimum: 1
        start_date:
          type: string
        end_date:
          type: string
        is_active:
          type: boolean
        registration_fields:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationFieldUpdateSchema"

    GetPubgTournamentsQuery:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 10

    RegisterForTournamentBody:
      type: object
      required:
        - field_values
      properties:
        field_values:
          type: array
          description: Required array (may be empty if no registration fields)
          items:
            type: object
            required:
              - field_id
              - value
            properties:
              field_id:
                type: integer
              value:
                type: string

    UserRole:
      type: string
      enum: [user, admin, super_admin]
      description: Matches UserRole in entities/User.ts

    UserPublicSummary:
      type: object
      description: Fields returned by GET /user/best (password_hash, email, phone omitted)
      properties:
        id:
          type: integer
        full_name:
          type: string
        gamer_name:
          type: string
        profile_picture_url:
          type: string
          nullable: true
        xp_points:
          type: integer
        coins:
          description: Stored as decimal in DB; may serialize as string in JSON
          oneOf:
            - type: number
            - type: string
        role:
          $ref: "#/components/schemas/UserRole"
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AchievementPublic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        color_theme:
          type: string
          nullable: true
        icon_url:
          type: string
        xp_reward:
          type: integer

    UserAchievementEntry:
      type: object
      properties:
        obtained_at:
          type: string
          format: date-time
        achievement:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/AchievementPublic"

    TournamentSummary:
      type: object
      description: Tournament entity as returned in user profile won_tournaments (relations may vary)
      properties:
        id:
          type: integer
        game_type:
          type: string
        game_ref_id:
          type: integer
        title:
          type: string
        description:
          type: string
        entry_fee:
          oneOf:
            - type: number
            - type: string
        prize_pool:
          oneOf:
            - type: number
            - type: string
        max_players:
          type: integer
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserProfilePublic:
      type: object
      description: Public user block in GET /user/:id/profile (no email, phone, password)
      properties:
        id:
          type: integer
        full_name:
          type: string
        gamer_name:
          type: string
        profile_picture_url:
          type: string
          nullable: true
        xp_points:
          type: integer
        coins:
          oneOf:
            - type: number
            - type: string
        role:
          $ref: "#/components/schemas/UserRole"
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserProfileResponse:
      type: object
      required:
        - user
        - achievements
        - won_tournaments
      properties:
        user:
          $ref: "#/components/schemas/UserProfilePublic"
        achievements:
          type: array
          items:
            $ref: "#/components/schemas/UserAchievementEntry"
        won_tournaments:
          type: array
          description: Up to 10 items, sorted by tournament updated_at descending
          items:
            $ref: "#/components/schemas/TournamentSummary"

    HeroContent:
      type: object
      properties:
        id:
          type: integer
        image:
          type: string
          description: Image URL or path string
        title:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateHeroContentBody:
      type: object
      required:
        - image
        - title
        - description
      properties:
        image:
          type: string
        title:
          type: string
        description:
          type: string

    UpdateHeroContentBody:
      type: object
      properties:
        image:
          type: string
        title:
          type: string
        description:
          type: string

security: []
# Per-path security overridden in path files

paths: {}
