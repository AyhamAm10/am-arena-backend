/reel:
  post:
    tags:
      - Reels
    summary: Create reel
    description: Creates a reel. Creator is the authenticated user.
    operationId: createReel
    security:
      - bearerAuth: []
    parameters:
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            allOf:
              - $ref: '#/components/schemas/CreateReelBody'
              - type: object
                required:
                  - video
                properties:
                  video:
                    type: string
                    format: binary
    responses:
      '201':
        description: Reel created
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      description: Reel entity
      '400':
        description: Validation error
      '401':
        description: Unauthorized
  get:
    tags:
      - Reels
    summary: Get reels
    description: |
      Paginated feed. Each reel includes comments (with users), like/comment counts, and whether the current user liked it.
      Optional `Authorization: Bearer` — when valid, `liked_by_current_user` is personalized; when omitted or invalid, it is always false.
    operationId: getReels
    security: []
    parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
        description: Optional Bearer token for liked_by_current_user
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      '200':
        description: List of reels
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ReelFeedItem'
                    meta:
                      type: object

/reel/{id}:
  patch:
    tags:
      - Reels
    summary: Update reel
    description: Updates a reel. Only the owner may update. Provide at least one of title, description, or a new video file.
    operationId: updateReel
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateReelBody'
        multipart/form-data:
          schema:
            allOf:
              - $ref: '#/components/schemas/UpdateReelBody'
              - type: object
                properties:
                  video:
                    type: string
                    format: binary
    responses:
      '200':
        description: Reel updated
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      description: Reel entity
      '400':
        description: Validation error
      '401':
        description: Unauthorized
      '403':
        description: Forbidden (not the reel owner)
      '404':
        description: Reel not found
  delete:
    tags:
      - Reels
    summary: Delete reel
    description: Deletes a reel and its comments and likes. Only the owner may delete.
    operationId: deleteReel
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    responses:
      '200':
        description: Reel deleted
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'
      '401':
        description: Unauthorized
      '403':
        description: Forbidden (not the reel owner)
      '404':
        description: Reel not found

/reel/{id}/comment:
  post:
    tags:
      - Reels
    summary: Add comment to reel
    operationId: addComment
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AddCommentBody'
    responses:
      '201':
        description: Comment added
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
      '400':
        description: Validation error or invalid reel id
      '401':
        description: Unauthorized
      '404':
        description: Reel not found

/reel/{id}/comments:
  get:
    tags:
      - Reels
    summary: Get reel comments
    description: Paginated list of comments for a reel.
    operationId: getReelComments
    security: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
    responses:
      '200':
        description: List of comments
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        type: object
                    meta:
                      type: object
      '400':
        description: Invalid reel id
      '404':
        description: Reel not found

/reel/{id}/like:
  post:
    tags:
      - Reels
    summary: Like reel
    operationId: likeReel
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    responses:
      '201':
        description: Reel liked
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
      '400':
        description: Already liked or invalid reel id
      '401':
        description: Unauthorized
      '404':
        description: Reel not found
  delete:
    tags:
      - Reels
    summary: Remove like from reel
    operationId: removeLike
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Reel ID
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    responses:
      '200':
        description: Like removed
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'
      '401':
        description: Unauthorized
      '404':
        description: Like or reel not found
