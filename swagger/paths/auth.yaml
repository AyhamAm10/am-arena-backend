/auth/register:
  post:
    tags:
      - Auth
    summary: Register a new user
    description: >
      multipart/form-data with field profile_picture (image) and form fields matching authRegisterSchema
      (full_name, gamer_name, email, password required; phone optional). Returns user, accessToken, and
      refreshToken in JSON; also sets refreshToken as an HTTP-only cookie.
    operationId: register
    security: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - full_name
              - gamer_name
              - email
              - password
              - profile_picture
            properties:
              full_name:
                type: string
              gamer_name:
                type: string
              email:
                type: string
                format: email
              password:
                type: string
                minLength: 6
              phone:
                type: string
              profile_picture:
                type: string
                format: binary
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthTokensResponse'
      '400':
        description: Validation error

/auth/login:
  post:
    tags:
      - Auth
    summary: Login
    description: >
      Returns user (without password_hash), accessToken, and refreshToken in JSON.
      Sets refreshToken in an HTTP-only cookie (same cookie options as register).
    operationId: login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthLoginBody'
    responses:
      '200':
        description: Logged in successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthTokensResponse'
      '400':
        description: Invalid credentials

/auth/refresh:
  post:
    tags:
      - Auth
    summary: Refresh access token
    description: >
      Verifies refresh token from httpOnly cookie and/or optional JSON body refreshToken.
      Returns a new accessToken. Does not require Authorization header.
    operationId: refreshTokens
    security: []
    parameters:
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRefreshBody'
    responses:
      '200':
        description: New access token issued
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthRefreshResponse'
      '400':
        description: Missing or invalid refresh token
      '401':
        description: Unauthorized (invalid or expired refresh)

/auth/logout:
  post:
    tags:
      - Auth
    summary: Logout
    description: Clears refresh token cookie. Requires authentication.
    operationId: logout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Logged out successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'
      '401':
        description: Unauthorized

/auth/current-user:
  get:
    tags:
      - Auth
    summary: Get current user
    description: Returns the authenticated user profile.
    operationId: getMe
    security:
      - bearerAuth: []
    parameters:
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    responses:
      '200':
        description: Current user data
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      description: User object (without password)
      '401':
        description: Unauthorized
      '404':
        description: User not found
