/auth/register:
  post:
    tags:
      - Auth
    summary: Register a new user
    description: Creates a user account. Optionally accepts multipart for profile_picture_url.
    operationId: register
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthRegisterBody'
    responses:
      '201':
        description: User created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthTokensResponse'
      '400':
        description: Validation error

/auth/login:
  post:
    tags:
      - Auth
    summary: Login
    description: Returns user and accessToken. Sets refreshToken in HTTP-only cookie.
    operationId: login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthLoginBody'
    responses:
      '200':
        description: Logged in successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/AuthTokensResponse'
      '400':
        description: Invalid credentials

/auth/logout:
  post:
    tags:
      - Auth
    summary: Logout
    description: Clears refresh token cookie. Requires authentication.
    operationId: logout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Logged out successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'
      '401':
        description: Unauthorized

/auth/current-user:
  get:
    tags:
      - Auth
    summary: Get current user
    description: Returns the authenticated user profile.
    operationId: getMe
    security:
      - bearerAuth: []
    parameters:
      - name: Accept-Language
        in: header
        schema:
          type: string
          example: en
    responses:
      '200':
        description: Current user data
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      type: object
                      description: User object (without password)
      '401':
        description: Unauthorized
      '404':
        description: User not found
